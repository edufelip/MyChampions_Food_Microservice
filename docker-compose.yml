version: '3.9'

x-food-common: &food-common
  build:
    context: .
    dockerfile: Dockerfile
    target: production
  image: mychampions-food-microservice:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    NODE_ENV: production
    PORT: "3000"
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
    interval: 30s
    timeout: 5s
    start_period: 15s
    retries: 3
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  food-microservice-blue:
    <<: *food-common
    container_name: food-microservice-blue
    ports:
      - "127.0.0.1:3201:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DEPLOY_SLOT: blue

  food-microservice-green:
    <<: *food-common
    container_name: food-microservice-green
    ports:
      - "127.0.0.1:3202:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DEPLOY_SLOT: green
