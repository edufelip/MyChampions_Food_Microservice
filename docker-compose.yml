version: '3.9'

x-food-common: &food-common
  image: ${FOOD_IMAGE:-ghcr.io/edufelip/mychampions_food_microservice:main}
  restart: unless-stopped
  env_file:
    - .env
  environment:
    NODE_ENV: production
    PORT: "3000"
    REDIS_URL: redis://food-catalog-redis:6379
  depends_on:
    food-catalog-redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
    interval: 30s
    timeout: 5s
    start_period: 15s
    retries: 3
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  food-catalog-redis:
    image: redis:7-alpine
    container_name: food-catalog-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
    volumes:
      - food-catalog-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  food-microservice-blue:
    <<: *food-common
    container_name: food-microservice-blue
    ports:
      - "127.0.0.1:3201:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://food-catalog-redis:6379
      DEPLOY_SLOT: blue

  food-microservice-green:
    <<: *food-common
    container_name: food-microservice-green
    ports:
      - "127.0.0.1:3202:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://food-catalog-redis:6379
      DEPLOY_SLOT: green

volumes:
  food-catalog-redis-data:
