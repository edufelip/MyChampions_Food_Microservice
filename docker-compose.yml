version: '3.9'

services:
  food-microservice:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: mychampions-food-microservice:latest
    container_name: food-microservice
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"   # Only accessible from localhost (Nginx proxies to it)
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
